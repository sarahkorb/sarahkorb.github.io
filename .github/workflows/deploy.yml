name: Deploy Jekyll site to GitHub Pages

on:
  push:
    branches:
      - main  # This will trigger the workflow when changes are pushed to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '2.7'  # Use the Ruby version compatible with Jekyll

    - name: Install dependencies
      run: |
        gem install bundler
        bundle install

    - name: Build the Jekyll site
      run: |
        bundle exec jekyll build

    - name: Deploy to GitHub Pages
      uses: jamesIves/github-pages-deploy-action@v4
      with:
        branch: gh-pages  # The branch where your built site will be pushed
        folder: _site     # The folder where the built site is located (default: _site)

